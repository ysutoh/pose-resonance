version: '3.8'

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's
    command: >
      bash -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  builder:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    command: >
      bash -c "npm install && npm run build && rm -f amplify-deploy.zip && cd dist && zip -r ../amplify-deploy.zip ."
